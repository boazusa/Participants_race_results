name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-v3-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-v3-
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip cache purge
        pip install --no-cache-dir setuptools==65.5.0 wheel
        pip install --no-cache-dir numpy==1.23.5
        pip install --no-cache-dir pandas==1.5.3
        pip install --no-cache-dir -r requirements.txt
        pip install --no-cache-dir -r tests/requirements-dev.txt
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
    
    - name: Type checking with mypy
      run: |
        mypy . || true  # Allow mypy to fail for now
    
    - name: Security check with bandit
      run: |
        bandit -r . || true  # Allow bandit to fail for now
    
    - name: Run unit tests
      run: |
        pytest tests/ -v --cov=best_results_3plus_or_realtiming_race --cov-report=xml --cov-report=html
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  performance:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip cache purge
        pip install --no-cache-dir setuptools==65.5.0 wheel
        pip install --no-cache-dir numpy==1.23.5
        pip install --no-cache-dir pandas==1.5.3
        pip install --no-cache-dir -r requirements.txt
        pip install --no-cache-dir -r tests/requirements-dev.txt
    
    - name: Run performance tests
      run: |
        pytest tests/ -v --benchmark-only --benchmark-json=benchmark.json || true
    
    - name: Store benchmark result
      uses: benchmark-action/github-action-benchmark@v1
      with:
        tool: 'pytest'
        output-file-path: benchmark.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        comment-on-alert: true
        alert-threshold: '200%'
        fail-on-alert: true

  integration:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip cache purge
        pip install --no-cache-dir setuptools==65.5.0 wheel
        pip install --no-cache-dir numpy==1.23.5
        pip install --no-cache-dir pandas==1.5.3
        pip install --no-cache-dir -r requirements.txt
        pip install --no-cache-dir -r tests/requirements-dev.txt
    
    - name: Run integration tests
      run: |
        pytest tests/ -v --timeout=300 || true

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements-dev.txt
    
    - name: Run security scan
      run: |
        bandit -r . -f json -o bandit-report.json || true
    
    - name: Upload security scan results
      uses: actions/upload-artifact@v4
      with:
        name: security-scan
        path: bandit-report.json
