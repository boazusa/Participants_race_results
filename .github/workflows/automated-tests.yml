name: 🧪 Automated Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, '3.10', 3.11]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-v6-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-v6-
          ${{ runner.os }}-pip-
        
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip cache purge
        pip install --no-cache-dir setuptools==65.5.0 wheel
        pip install --no-cache-dir numpy==1.26.4
        pip install --no-cache-dir pandas==2.0.3
        pip install --no-cache-dir -r requirements.txt
        pip install --no-cache-dir pytest pytest-cov
        
    - name: 🧪 Run tests
      run: |
        cd tests && python -m pytest . --tb=short --cov=best_results_3plus_or_realtiming_race --cov-report=xml --cov-report=html
        
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          htmlcov/
          coverage.xml
          test-results.xml
        retention-days: 30
        
    - name: ✅ Test Summary
      run: |
        echo "🎉 Test execution completed for Python ${{ matrix.python-version }}"
        echo "📊 Check the Actions tab for detailed results"
