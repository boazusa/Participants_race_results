[tox]
envlist = py39,py310,py311,flake8,black,mypy,coverage
isolated_build = true

[testenv]
deps = 
    pytest>=7.4.0
    pytest-cov>=4.1.0
    pytest-html>=4.1.0
    pytest-mock>=3.11.1
    requests-mock>=1.11.0
    psutil>=5.9.0
    openpyxl>=3.1.0
commands = 
    pytest {posargs} --cov=best_results_3plus_or_realtiming_race --cov=excel_analysis --cov=flask_app --cov=single_person_flask_app --cov-report=html --cov-report=term-missing

[testenv:py39]
basepython = python3.9

[testenv:py310]
basepython = python3.10

[testenv:py311]
basepython = python3.11

[testenv:flake8]
deps = flake8>=6.0.0
commands = flake8 best_results_3plus_or_realtiming_race.py excel_analysis.py flask_app.py single_person_flask_app.py Single_person_results_w_top_results.py tests/

[testenv:black]
deps = black>=23.7.0
commands = black --check --diff best_results_3plus_or_realtiming_race.py excel_analysis.py flask_app.py single_person_flask_app.py Single_person_results_w_top_results.py tests/

[testenv:mypy]
deps = 
    mypy>=1.5.0
    types-requests>=2.31.0
    types-pandas>=2.1.0
commands = mypy best_results_3plus_or_realtiming_race.py excel_analysis.py flask_app.py single_person_flask_app.py Single_person_results_w_top_results.py

[testenv:coverage]
deps = 
    pytest>=7.4.0
    pytest-cov>=4.1.0
    coverage>=7.2.0
commands = 
    coverage run -m pytest tests/
    coverage report
    coverage html

[testenv:performance]
deps = 
    pytest>=7.4.0
    pytest-benchmark>=4.0.0
    psutil>=5.9.0
    memory-profiler>=0.61.0
commands = pytest tests/test_performance.py -v --benchmark-only

[testenv:integration]
deps = 
    pytest>=7.4.0
    pytest-xdist>=3.3.1
    requests-mock>=1.11.0
    openpyxl>=3.1.0
commands = pytest tests/test_integration.py -v -n auto

[testenv:security]
deps = bandit>=1.7.0
commands = bandit -r best_results_3plus_or_realtiming_race.py excel_analysis.py flask_app.py single_person_flask_app.py Single_person_results_w_top_results.py

[testenv:docs]
deps = 
    sphinx>=7.1.0
    sphinx-rtd-theme>=1.3.0
commands = sphinx-build -b html docs/ docs/_build/html

[testenv:clean]
deps = 
commands = 
    python -c "import shutil; shutil.rmtree('htmlcov', ignore_errors=True)"
    python -c "import shutil; shutil.rmtree('.coverage', ignore_errors=True)"
    python -c "import shutil; shutil.rmtree('.pytest_cache', ignore_errors=True)"
    python -c "import shutil; shutil.rmtree('.mypy_cache', ignore_errors=True)"
    python -c "import shutil; shutil.rmtree('dist', ignore_errors=True)"
    python -c "import shutil; shutil.rmtree('build', ignore_errors=True)"

[flake8]
max-line-length = 100
exclude = 
    .git,
    __pycache__,
    .pytest_cache,
    .mypy_cache,
    htmlcov,
    .coverage,
    dist,
    build,
    *.egg-info
ignore = 
    E203,  # whitespace before ':'
    E501,  # line too long (handled by black)
    W503,  # line break before binary operator
    F401,  # imported but unused (handled by isort)

[mypy]
python_version = 3.9
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
ignore_missing_imports = True
