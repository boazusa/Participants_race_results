[tool:pytest]
# pytest configuration
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=best_results_3plus_or_realtiming_race
    --cov=excel_analysis
    --cov=flask_app
    --cov=single_person_flask_app
    --cov=Single_person_results_w_top_results
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-fail-under=80

# Custom markers
markers =
    unit: Unit tests for individual functions and methods
    integration: Integration tests for component interactions
    e2e: End-to-end tests for complete workflows
    performance: Performance and load tests
    web_scraping: Tests that involve web scraping
    flask: Tests for Flask applications
    excel: Tests for Excel file operations
    slow: Tests that take a long time to run
    external: Tests that require external services
    hebrew: Tests that specifically test Hebrew text handling

# Minimum version
minversion = 6.0

# Test discovery
norecursedirs = 
    .git
    .tox
    dist
    build
    *.egg
    __pycache__
    .pytest_cache
    htmlcov
    .coverage
    excel
    Screenshots

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
